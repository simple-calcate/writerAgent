name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新 push 时取消正在跑的旧 job
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
        env:
          CI: true

      - name: Build (renderer + main + preload)
        # 只跑 vite 构建，跳过 obfuscate（CI 不需要混淆，加速构建）
        run: npx electron-vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        if: github.event_name == 'push'
        with:
          name: build-output
          path: out/
          retention-days: 7
