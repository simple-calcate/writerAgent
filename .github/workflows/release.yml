name: Release

on:
  push:
    tags:
      - 'v*'

# Release 是重要操作，不取消正在跑的
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write   # 创建 Release 需要写权限

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test
        env:
          CI: true

      - name: Read version from tag
        id: version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          # 自动识别预发布版本（含 -beta / -rc / -alpha / -dev）
          if [[ "${GITHUB_REF#refs/tags/}" =~ -(beta|rc|alpha|dev)\.?[0-9]*$ ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Build & package (electron-builder)
        # 跳过 obfuscate（开源项目，混淆拖慢构建；如需混淆改用 npm run dist）
        run: |
          npx electron-vite build
          npx electron-builder --win nsis portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
          files: |
            release/novel-writer-setup-*.exe
            release/novel-writer-portable-*.exe
